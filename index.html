<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配手机打开 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的自用网站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            min-height: 100vh;
            background-color: #12151c;
            color: #e8edf3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1e232d;
            padding: 48px 36px;
            border-radius: 16px;
            box-shadow: 0 8px 30px #00000040;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            color: #79b8ff;
        }
        p {
            font-size: 16px;
            line-height: 1.8;
            opacity: 0.85;
            margin-bottom: 30px;
        }
        .link-group a {
            display: inline-block;
            padding: 12px 24px;
            margin: 0 8px 12px;
            background: #2c3644;
            color: #79b8ff;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s ease;
        }
        .link-group a:hover {
            background: #3a475a;
        }
        footer {
            margin-top: 32px;
            font-size: 13px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Elben-fier 的自用站点</h1>
        <p>这是搭建在 GitHub Pages 的纯静态个人网站<br>仅作个人工具、笔记、收藏使用</p>
        <div class="link-group">
            <a href="#">我的笔记</a>
            <a href="#">工具合集</a>
            <a href="#">收藏页面</a>
        </div>
    </div>
    <footer>
        Powered by GitHub Pages
    </footer>
</body>
</html>
